name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          # This ensures the build process uses the subfolder path
          BASE_PATH: "/devhub-terminal/"
        run: bun run build

      - name: Add SPA 404 fallback
        run: |
          # Since you use Hash History, 404.html is a safety net.
          # It must be a direct copy of index.html to avoid refresh loops.
          if [ -f dist/client/index.html ]; then
            cp dist/client/index.html dist/client/404.html
            touch dist/client/.nojekyll
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
