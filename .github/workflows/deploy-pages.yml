name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          # Sets the base path for your assets to load correctly in a subfolder
          BASE_PATH: "/devhub-terminal/"
          VITE_BASE_PATH: "/devhub-terminal/"
        run: bun run build

      - name: Prepare Static Files for GitHub Pages
        run: |
          # TanStack Start places static files in dist/client
          # We relocate them to dist/ root so GitHub Pages finds them
          if [ -d dist/client ]; then
            echo "Flattening structure..."
            cp -r dist/client/* dist/
          fi
          
          # Use index.html as the 404 page to handle SPA refreshes
          if [ -f dist/index.html ]; then
            cp dist/index.html dist/404.html
          fi
          
          # Tell GitHub not to process the site with Jekyll
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the root dist folder which now contains the client files
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
