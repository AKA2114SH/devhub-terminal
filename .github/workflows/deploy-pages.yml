name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          # Ensures internal links and assets use the correct subfolder
          BASE_PATH: "/devhub-terminal/"
          VITE_BASE_PATH: "/devhub-terminal/"
        run: bun run build

      - name: Prepare Static Files for GitHub Pages
        run: |
          # 1. TanStack Start puts static files in dist/client. 
          # We must move them to the root of dist so GitHub Pages can see them.
          if [ -d dist/client ]; then
            echo "Relocating client files to root..."
            cp -r dist/client/* dist/
          fi
          
          # 2. Duplicate index.html as 404.html for SPA routing safety.
          if [ -f dist/index.html ]; then
            cp dist/index.html dist/404.html
          fi
          
          # 3. Prevent GitHub from ignoring folders starting with underscores.
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the now-flattened dist folder
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
