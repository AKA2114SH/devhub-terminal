name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          # BASE_PATH should be set to "/devhub-terminal/" in your GitHub Repository Variables
          BASE_PATH: ${{ vars.BASE_PATH || '/' }}
        run: bun run build

      - name: Add SPA 404 fallback
        run: |
          # Navigate into the client directory where the actual HTML lives
          # Based on your terminal output, this is the correct path for TanStack Start static builds
          if [ -f dist/client/index.html ]; then
            cp dist/client/index.html dist/client/404.html
            touch dist/client/.nojekyll
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This ensures that GitHub Pages serves the contents of the client folder 
          # directly at your-username.github.io/devhub-terminal/
          path: ./dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
